<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>端午公益课报名</title>
<style>
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#f8f2e8,#edf3eb);color:#1f2f25;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:26px 18px}.card{width:100%;max-width:520px;background:#fff;border-radius:20px;padding:28px 22px;box-shadow:0 12px 34px rgba(0,0,0,.12);border:1px solid rgba(33,76,54,.12)}.brand{text-align:center;font-size:14px;color:#6b7a6f;margin-bottom:8px;letter-spacing:.06em}h1{font-size:25px;line-height:1.25;margin:0 0 10px;text-align:center;color:#214c36}.sub{font-size:15px;line-height:1.65;text-align:center;margin:0 0 22px;color:#59655d}.info{background:#f6f2e9;border-radius:14px;padding:12px 14px;margin-bottom:20px;font-size:14px;line-height:1.7;color:#455046}.field{margin:14px 0}label{display:block;font-weight:700;margin-bottom:7px;color:#26372c}input{width:100%;border:1px solid #c9d0c9;border-radius:12px;padding:13px 12px;font-size:17px;background:#fff;outline:none}input:focus{border-color:#214c36;box-shadow:0 0 0 3px rgba(33,76,54,.13)}button{width:100%;border:0;border-radius:13px;margin-top:18px;padding:14px;font-size:18px;font-weight:700;background:#214c36;color:#fff}.note{font-size:13px;color:#7a827b;margin-top:16px;text-align:center;line-height:1.5}</style>
</head>
<body>
<div class="wrap">
  <main class="card">
    <div class="brand">文珠健身工作室 × 灸十二堂</div>
    <h1>端午公益课报名</h1>
    <p class="sub">端午中医养生公益课<br>中医谈减肥暨抗焦虑养神桩</p>
    <div class="info">授课场地：市中区文化西路丽景大酒店八楼<br>活动时间：6月20日（周六）下午2:00开始<br>课程时长：约1小时</div>
    <form action="https://formsubmit.co/3680714578@qq.com" method="POST">
      <input type="hidden" name="_subject" value="端午公益课报名">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <div class="field"><label for="name">姓名</label><input id="name" name="姓名" placeholder="请输入姓名" autocomplete="name" maxlength="20" required></div>
      <div class="field"><label for="phone">电话号</label><input id="phone" name="电话号" placeholder="请输入联系电话" autocomplete="tel" inputmode="tel" pattern="[0-9+\-\s]{6,20}" maxlength="20" required></div>
      <button type="submit">提交报名</button>
    </form>
    <div class="note">仅用于本次公益活动报名统计。名额有限，请提前报名。</div>
  </main>
</div>
</body>
</html>
