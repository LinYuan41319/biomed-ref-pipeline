name: Bug report
description: Report a reproducible problem using synthetic data.
title: "[Bug]: "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Please do not attach real manuscripts, Zotero databases, JCR workbooks, or private research data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal steps using synthetic data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, package version, and command used.
